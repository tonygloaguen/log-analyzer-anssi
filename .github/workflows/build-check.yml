name: Build check — ARM64 · SBOM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Validation build Docker ARM64 ──────────────────────────────────────────
  docker-arm64:
    name: Docker buildx ARM64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (ARM64 émulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image ARM64 (validation uniquement, sans push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: false
          tags: log-analyzer-anssi:ci-check
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Note : LOLDrivers curl au build peut échouer en CI réseau restreint
          # Le Dockerfile gère ce cas avec || echo "... différé au runtime"

  # ─── SBOM (Software Bill of Materials) ──────────────────────────────────────
  sbom:
    name: SBOM — syft
    runs-on: ubuntu-latest
    needs: docker-arm64
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft dir:. -o spdx-json=sbom.spdx.json
          syft dir:. -o cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90
