---
# docker-compose.yml — log-analyzer-anssi
# Cible : Raspberry Pi 4 (ARM64, 4 Go RAM)
# Conformité ANSSI NIS2 Art.21.2.h — LLM local, pas de cloud

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "5"

volumes:
  ollama-data:

services:
  # ─────────────────────────────────────────────
  # SIEM — moteur de détection principal
  # ─────────────────────────────────────────────
  siem:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: log-siem
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      ollama:
        condition: service_healthy
      ntfy:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import app; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging: *default-logging

  # ─────────────────────────────────────────────
  # ntfy — notifications push auto-hébergées
  # ─────────────────────────────────────────────
  ntfy:
    image: binwiederhier/ntfy:latest
    platform: linux/arm64
    container_name: log-ntfy
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./ntfy-data:/var/lib/ntfy
    command: serve
    logging: *default-logging

  # ─────────────────────────────────────────────
  # Ollama — LLM local granite3.3:8b (ARM64 Q4_K_M)
  # 4 Go swap requis : sudo dphys-swapfile swapoff &&
  #   sudo sed -i 's/CONF_SWAPSIZE=.*/CONF_SWAPSIZE=4096/' /etc/dphys-swapfile &&
  #   sudo dphys-swapfile setup && sudo dphys-swapfile swapon
  # ─────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    platform: linux/arm64
    container_name: log-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging: *default-logging
