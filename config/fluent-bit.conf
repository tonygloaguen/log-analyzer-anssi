# ─────────────────────────────────────────────────────────────────────────────
# Fluent Bit — Configuration ANSSI
# Transport TLS mutuel (mTLS), rotation, intégrité
# Ref: Guide ANSSI journalisation 2022
# ─────────────────────────────────────────────────────────────────────────────

[SERVICE]
    Flush           5
    Log_Level       info
    Log_File        /var/log-analyzer/fluent-bit.log
    Daemon          Off
    Parsers_File    /fluent-bit/etc/parsers.conf
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020
    storage.path    /var/log-analyzer/fluent-bit-storage/
    storage.sync    normal
    storage.checksum On

# ─────────────────────────────────────────────────────────────────────────────
# INPUTS — Collecte des sources
# ─────────────────────────────────────────────────────────────────────────────

# Logs système via syslog (UDP/TCP avec TLS)
# [INPUT]
#     Name            syslog
#     Listen          0.0.0.0
#     Port            5140
#     Mode            tcp
#     Parser          syslog-rfc5424
#     Tag             syslog.*
    # TLS mutuel (ANSSI)
#     tls             On
#     tls.verify      On
#     tls.ca_file     /certs/ca.crt
#     tls.crt_file    /certs/server.crt
#     tls.key_file    /certs/server.key

# Logs applicatifs depuis fichiers
[INPUT]
    Name            tail
    Path            /var/log-analyzer/app/*.log
    Parser          json
    Tag             app.*
    DB              /var/log-analyzer/fluent-bit-tail.db
    Refresh_Interval 5
    Read_from_Head  True
    storage.type    filesystem

# Logs nginx
[INPUT]
    Name            tail
    Path            /var/log/nginx/access.log
    Parser          nginx
    Tag             nginx.access
    DB              /var/log-analyzer/nginx-tail.db
    storage.type    filesystem

# Logs SSH/auditd
[INPUT]
    Name            tail
    Path            /var/log/auth.log
    Parser          syslog-rfc3164-local
    Tag             ssh.*
    DB              /var/log-analyzer/auth-tail.db
    storage.type    filesystem

# ─────────────────────────────────────────────────────────────────────────────
# FILTERS — Enrichissement et filtrage
# ─────────────────────────────────────────────────────────────────────────────

# Ajouter hostname et timestamp normalise
[FILTER]
    Name            record_modifier
    Match           *
    Record          hostname ${HOSTNAME}
    Record          collector fluent-bit
    Record          environment production

# Supprimer les champs vides
[FILTER]
    Name            grep
    Match           *
    Exclude         log ^$

# Limiter les logs de debug (conformité ANSSI : pas de sur-collecte)
[FILTER]
    Name            grep
    Match           app.*
    Exclude         level ^debug$

# ─────────────────────────────────────────────────────────────────────────────
# OUTPUTS — Acheminement vers Loki + fichiers locaux
# ─────────────────────────────────────────────────────────────────────────────

# → Loki (via HTTP avec TLS)
[OUTPUT]
    Name            loki
    Match           *
    Host            loki
    Port            3100
    Labels          job=$TAG, host=${HOSTNAME}
    Label_keys      $level,$source
    Auto_Kubernetes_Labels Off
    Retry_Limit     5
    # TLS vers Loki
    tls             On
    tls.verify      Off  # Mettre On en prod avec certificat valide

# → Fichiers locaux (backup ANSSI : stockage local + remote)
[OUTPUT]
    Name            file
    Match           *
    Path            /var/log-analyzer/archive/
    File            collected.log
    Format          json_lines

# → Monitoring Fluent Bit lui-même
[OUTPUT]
    Name            prometheus_exporter
    Match           internal_metrics
    Host            0.0.0.0
    Port            2021
