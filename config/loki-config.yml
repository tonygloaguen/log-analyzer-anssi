# ─────────────────────────────────────────────────────────────────────────────
# Loki — Configuration conforme ANSSI
# Rétention configurable, stockage local, pas d'analytics
# ─────────────────────────────────────────────────────────────────────────────

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

# ── Rétention des logs (ANSSI : min 1 an en prod) ────────────────────────────
limits_config:
  retention_period: 2160h   # 90 jours (configurable via LOG_RETENTION_DAYS)
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # Rejeter les logs > 7 jours d'âge
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_entries_limit_per_query: 10000
  max_query_series: 1000
  max_query_lookback: 2160h

# ── Schéma de stockage ───────────────────────────────────────────────────────
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# ── Compaction et rétention automatique ─────────────────────────────────────
compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  compaction_interval: 1h
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# ── Ruler (alertes basées sur les logs) ─────────────────────────────────────
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://localhost:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# ── Analytics désactivé (ANSSI : pas de télémétrie) ─────────────────────────
analytics:
  reporting_enabled: false

# ── Stockage des chunks ──────────────────────────────────────────────────────
chunk_store_config:
  chunk_cache_config:
    embedded_cache:
      enabled: true
      max_size_mb: 100

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

table_manager:
  retention_deletes_enabled: true
  retention_period: 2160h
