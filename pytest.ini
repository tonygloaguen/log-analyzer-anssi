[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --cov=src --cov-report=term-missing --cov-fail-under=74
# Seuil actuel : 74% — objectif cible : 80% après couverture pg_writer et log_collector
# Modules non couverts : log_collector.py (Loki), pg_writer.py (PostgreSQL) — clients infra
markers =
    unit: Tests unitaires (sans dépendances externes)
    integration: Tests d'intégration (pipeline complet)
    slow: Tests lents (LLM, base de données)
