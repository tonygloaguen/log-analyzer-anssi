[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: Tests unitaires (sans dépendances externes)
    integration: Tests d'intégration (pipeline complet)
    slow: Tests lents (LLM, base de données)
